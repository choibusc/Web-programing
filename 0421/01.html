<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display속성</title>
    <style>
        #box {
            display: inline-block; /* inline-block은 inline과 block의 특성을 모두 가짐 */
            background-color: skyblue;
            width: 100px; 
            height: 50px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <p>display 속성의 값 중에서 inline과 inline-block의 차이점 비교</p>
    <span>inline 요소</span>
    <div id="box">차이점 비교 대상</div>
    <span>inline 요소</span>
    <p>display 속성의 값 중에서 inline과 inline-block의 차이점 비교</p>
</body>
</html>
