<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 객체 사용방법</title>
    <script>
        let product = {
            제품명: "MacBook Air",
            유형: "노트북",
            가격: 1500000,
            제조사: "Apple",
        }
        
        for(let key in product){
            alert(key + " : " + product[key]);
        }

        alert(product.제품명 + "의 가격은 " + product.가격 + "원입니다.");
    </script>
</head>
<body>
    
</body>
</html>
