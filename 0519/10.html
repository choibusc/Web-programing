<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        const PI = Math.PI;

    function circleCalc(r){
    let circum = 2 * PI * r;
    alert("반지름이 "+r+"cm인 원의 둘레: " + circum + "cm");

    let area = PI * Math.pow(r, 2);
    alert("반지름이 "+r+"cm인 원의 넓이: " + area + "crl");

    }
    circleCalc(7);
    circleCalc(10);
    circleCalc(15);
    </script>
</head>
